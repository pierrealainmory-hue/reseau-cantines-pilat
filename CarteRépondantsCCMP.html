            maxZoom: 19
        }).addTo(map);

        fetch('https://nominatim.openstreetmap.org/search?q=Parc+naturel+régional+du+Pilat&format=json&polygon_geojson=1&limit=1')
            .then(response => response.json())
            .then(data => {
                if (data && data.length > 0) {
                    L.geoJSON(data[0].geojson, {
                        style: {
                            color: '#549e39',
                            weight: 2.5,
                            opacity: 0.8,
                            fillColor: '#549e39',
                            fillOpacity: 0.05,
                            dashArray: '5, 8'
                        }
                    }).addTo(map);

            })
            .catch(err => console.error("Impossible de charger les limites du PNR :", err));

        let markerLayerGroup = L.layerGroup().addTo(map);

            // Récupération de l'état des filtres
            const showInt = document.getElementById('filter-enquete-oui').checked;
            const showNonInt = document.getElementById('filter-enquete-non').checked;
            const showAnnuaire = document.getElementById('filter-annuaire').checked;

            // Filtrage des données
            const filteredData = producteursData.filter(prod => {
                if (prod.source === 'enquete') {
                    if (prod.interesse) return showInt;
                    if (!prod.interesse) return showNonInt;
                } else if (prod.source === 'annuaire') {
                    return showAnnuaire;
                }
                return false;
            });

            // Vider la carte
            markerLayerGroup.clearLayers();

            // Variables pour l'agrégation de la liste latérale
            const communesAgregees = {};
            let totalCount = 0;

            filteredData.forEach(prod => {
                // Décalage pour éviter la superposition totale dans une même commune
                let jitterLat = (Math.random() - 0.5) * 0.015;
                let jitterLng = (Math.random() - 0.5) * 0.015;
                let finalLat = prod.lat + jitterLat;
                let finalLng = prod.lng + jitterLng;

                let filiereColor = colors[prod.filiere];
                let iconClass = icons[prod.filiere];
                let categoryName = filiereNoms[prod.filiere];
                
                let statutText = "";
                if (prod.source === 'enquete') {
                    statutText = prod.interesse ? 
                        "<span class='text-emerald-600 font-bold'>Intéressé·e (Enquête Phase 1)</span>" : 
                        "<span class='text-gray-500 italic'>Non intéressé·e actuellement</span>";
                } else {
                    statutText = "<span class='text-blue-500 font-bold'>Non enquêté (Annuaire PAT)</span>";
                }

                // LOGIQUE VISUELLE CONDITIONNELLE
                let radius, fillColor, color, weight, fillOpacity, dashArray;
                
                if (prod.source === 'annuaire') {
                    // Petits points translucides pour l'annuaire
                    radius = 5.5;
                    fillColor = filiereColor;
                    color = "#ffffff";
                    weight = 1;
                    fillOpacity = 0.5;
                    dashArray = '';
                } else if (prod.interesse) {
                    // Points pleins classiques pour les intéressés
                    radius = 8;
                    fillColor = filiereColor;
                    color = "#ffffff";
                    weight = 2;
                    fillOpacity = 0.9;
                    dashArray = '';
                } else {
                    // Points vidés pour les non-intéressés
                    radius = 6.5;
                    fillColor = "#ffffff";
                    color = filiereColor;
                    weight = 3;
                    fillOpacity = 0.9;
                    dashArray = '';
                }

                let marker = L.circleMarker([finalLat, finalLng], {
                    radius: radius,
                    fillColor: fillColor,
                    color: color,
                    weight: weight,
                    opacity: 1,
                    fillOpacity: fillOpacity,
                    dashArray: dashArray
                });

                let popupContent = `
                    <div class="popup-header" style="background-color: ${filiereColor}; ${prod.source==='annuaire' ? 'opacity: 0.7;' : (!prod.interesse ? 'opacity: 0.8;' : '')}">
                        <i class="fa-solid ${iconClass}"></i> ${categoryName}
                    </div>
                    <div class="popup-body">
                        <strong class="font-oswald text-lg text-dixDark">${prod.nom}</strong><br>
                        <span class="text-sm text-gray-500"><i class="fa-solid fa-location-dot"></i> ${prod.commune}</span><br>
                        <div class="mt-2 pt-2 border-t border-gray-100">
                            ${statutText}
                        </div>
                    </div>
                `;
                marker.bindPopup(popupContent);
                markerLayerGroup.addLayer(marker);

                // --- AGRÉGATION POUR LA LISTE ---
                if(!communesAgregees[prod.commune]) {
                    communesAgregees[prod.commune] = { nom: prod.commune, total: 0, enquete_int: 0, enquete_non: 0, annuaire: 0, filieres: {} };
                }
                communesAgregees[prod.commune].total++;
                totalCount++;

                if (prod.source === 'enquete') {
                    if(prod.interesse) communesAgregees[prod.commune].enquete_int++;
                    else communesAgregees[prod.commune].enquete_non++;
                } else {
                    communesAgregees[prod.commune].annuaire++;
                }
                
                // Historique des filières/styles pour les petites pastilles
                if(!communesAgregees[prod.commune].filieres[prod.filiere]) {
                    communesAgregees[prod.commune].filieres[prod.filiere] = { int: 0, non: 0, ann: 0 };
                }
                if (prod.source === 'enquete') {
                    if(prod.interesse) communesAgregees[prod.commune].filieres[prod.filiere].int++;
                    else communesAgregees[prod.commune].filieres[prod.filiere].non++;
                } else {
                    communesAgregees[prod.commune].filieres[prod.filiere].ann++;
                }
            });

            // Mise à jour du compteur global
            document.getElementById('total-count-badge').textContent = `N = ${totalCount}`;

            // Remplissage de la liste latérale
            const rankingList = document.getElementById('ranking-list');
            rankingList.innerHTML = ''; // Reset
            
            const communesArray = Object.values(communesAgregees);
            
            // Trouver le maximum pour calculer les pourcentages de la barre de fond
            const maxCount = communesArray.reduce((max, c) => Math.max(max, c.total), 0);

            communesArray.sort((a, b) => b.total - a.total).forEach(commune => {
                let widthPercent = maxCount > 0 ? (commune.total / maxCount) * 100 : 0;
                
                // Préparer les mini-badges de couleurs
                let badgesHtml = '';
                for (let filiere in commune.filieres) {
                    let cData = commune.filieres[filiere];
                    // Intéressés
                    for(let i=0; i < cData.int; i++) badgesHtml += `<div class="w-3 h-3 rounded-full inline-block mr-0.5 shadow-sm" style="background-color: ${colors[filiere]}; border: 1px solid ${colors[filiere]};"></div>`;
                    // Non-intéressés
                    for(let i=0; i < cData.non; i++) badgesHtml += `<div class="w-3 h-3 rounded-full inline-block mr-0.5" style="background-color: #ffffff; border: 2px solid ${colors[filiere]};"></div>`;
                    // Annuaire
                    for(let i=0; i < cData.ann; i++) badgesHtml += `<div class="w-2.5 h-2.5 rounded-full inline-block mr-0.5 opacity-50" style="background-color: ${colors[filiere]};"></div>`;
                }
                
                let li = document.createElement('li');
                li.className = "relative bg-gray-50 p-3 rounded-lg overflow-hidden border border-gray-100 flex justify-between items-center transition-all";
                li.innerHTML = `
                    <div class="absolute top-0 left-0 h-full bg-green-100/30 -z-0 transition-all duration-500" style="width: ${widthPercent}%;"></div>
                    <div class="relative z-10 flex flex-col">
                        <span class="font-bold text-gray-700 text-sm">${commune.nom}</span>
                        <div class="mt-1.5 flex items-center flex-wrap gap-y-1">${badgesHtml}</div>
                    </div>
                    <div class="relative z-10 text-right flex flex-col items-end">
                        <span class="bg-white border border-gray-200 text-dixDark font-oswald font-bold px-2.5 py-1 rounded text-sm shadow-sm mb-1">
                            ${commune.total} prod.
                        </span>
                        ${commune.enquete_int > 0 ? `<span class="text-[9px] text-emerald-600 font-bold uppercase">${commune.enquete_int} engagé·e·s</span>` : ''}
                    </div>
                `;
                rankingList.appendChild(li);
            });
            
            // Re-centrer la carte si des points existent
            if(filteredData.length > 0) {
                let groupBounds = new L.featureGroup(filteredData.map(c => L.marker([c.lat, c.lng]))).getBounds();
                // Légère animation de zoom
                map.flyToBounds(groupBounds.pad(0.1), {duration: 0.5});
            }
        }

        // Lancement initial
        window.onload = function() {
            updateMapAndSidebar();
        };

    </script>
</body>
</html>
